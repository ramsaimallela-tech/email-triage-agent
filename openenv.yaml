name: email-triage-agent
version: "1.0"
author: ramsaimallela-tech
description: >
  An OpenEnv-compatible AI agent environment that simulates real-world
  email triage. The agent must classify incoming emails (important, spam,
  normal), prioritise them, and draft appropriate replies — balancing
  accuracy, response quality, and processing speed.

environment:
  observation_space:
    email_text:
      type: string
      description: Full body of the incoming email
    sender:
      type: string
      description: Sender email address
    timestamp:
      type: string
      description: ISO-8601 timestamp of when the email arrived
    subject:
      type: string
      description: Email subject line
    has_attachments:
      type: boolean
      description: Whether the email contains attachments
    thread_length:
      type: integer
      description: Number of prior emails in this thread

  action_space:
    category:
      type: enum
      values: [important, spam, normal]
      description: Classification of the email
    priority:
      type: integer
      range: [1, 5]
      description: Priority level (1 = highest, 5 = lowest)
    reply:
      type: string
      description: Draft reply text to send back

  reward_range: [0.0, 1.0]
  reward_components:
    classification_accuracy:
      weight: 0.40
      description: Correct category assignment
    reply_quality:
      weight: 0.30
      description: Relevance and professionalism of the reply
    priority_accuracy:
      weight: 0.20
      description: Correct priority assignment
    efficiency_bonus:
      weight: 0.10
      description: Bonus for concise, actionable replies

tasks:
  - name: easy
    description: Clear-cut emails with obvious labels
    max_steps: 5
    config_file: tasks/easy.py
  - name: medium
    description: Ambiguous emails requiring reasoning
    max_steps: 8
    config_file: tasks/medium.py
  - name: hard
    description: Complex multi-context emails with nuanced replies
    max_steps: 12
    config_file: tasks/hard.py

baseline:
  agent: agents/baseline.py
  seed: 42
  expected_scores:
    easy: "0.65-0.80"
    medium: "0.40-0.55"
    hard: "0.20-0.35"
